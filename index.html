<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player - Aero Glass</title>
    <style>
        /* CSS - Tema "Fruit Aero" (Glassmorphism) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Gradiente suave lembrando os wallpapers do macOS */
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            color: #1d1d1f;
            /* Usa a fonte padrão do sistema (San Francisco na Apple) */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            /* Efeito de Vidro (Glassmorphism) */
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.5px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            background-color: rgba(255, 255, 255, 0.6);
            color: #1d1d1f;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        input[type="text"]:focus {
            background-color: rgba(255, 255, 255, 0.9);
            border-color: #007aff; /* Azul Apple */
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2);
        }

        input[type="text"]::placeholder {
            color: #86868b;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            background-color: #007aff; /* Azul Apple */
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3);
        }

        button:hover {
            background-color: #006ce4;
            box-shadow: 0 6px 14px rgba(0, 122, 255, 0.4);
            transform: translateY(-1px);
        }

        button:active {
            transform: scale(0.97) translateY(0);
            box-shadow: 0 2px 5px rgba(0, 122, 255, 0.3);
        }

        .player-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            display: none;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        video, iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Reprodutor de Vídeo</h1>
        
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Cole o link do vídeo (MP4 ou YouTube)..." autocomplete="off">
            <button onclick="loadVideo()">Play</button>
        </div>

        <div class="player-wrapper" id="playerWrapper">
            <!-- O player (video ou iframe) será injetado aqui via JavaScript -->
        </div>
    </div>

    <script>
        // JavaScript mantido sem alterações lógicas, apenas o visual mudou.
        function loadVideo() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const wrapper = document.getElementById('playerWrapper');
            
            if (!urlInput) {
                alert("Por favor, insira um link válido.");
                return;
            }

            wrapper.style.display = 'block';
            wrapper.innerHTML = ''; 

            const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const ytMatch = urlInput.match(ytRegex);

            if (ytMatch && ytMatch[1]) {
                const videoId = ytMatch[1];
                const iframe = document.createElement('iframe');
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                iframe.allowFullscreen = true;
                wrapper.appendChild(iframe);
            } else {
                const video = document.createElement('video');
                video.src = urlInput;
                video.controls = true;
                video.autoplay = true;
                wrapper.appendChild(video);
            }
        }

        document.getElementById('videoUrl').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                loadVideo();
            }
        });
    </script>

</body>
</html>
