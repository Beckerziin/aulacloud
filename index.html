<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player - Frutiger Aero Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Fundo clássico Frutiger: Gradiente Aurora com cara de natureza/tecnologia */
            background: radial-gradient(circle at top left, #2af598 0%, #009efd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 850px;
            /* Efeito Vidro Aero Realista */
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2), 
                        inset 0 0 20px rgba(255, 255, 255, 0.3);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        /* O famoso brilho de vidro (Glossy overlay) */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        h1 {
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            font-size: 28px;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            font-size: 16px;
            outline: none;
            color: #333;
        }

        /* Botão Estilo Bolha de Gel (Skeuomorphic) */
        button {
            padding: 15px 35px;
            border-radius: 50px;
            border: 1px solid #00c6ff;
            background: linear-gradient(to bottom, #00c6ff 0%, #0072ff 100%);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4), 
                        inset 0 2px 2px rgba(255,255,255,0.5);
            transition: all 0.2s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
            background: linear-gradient(to bottom, #00d4ff 0%, #0082ff 100%);
        }

        .player-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            display: none;
            border: 5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video, iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fruit Aero Video Player</h1>
        
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Insira o link aqui...">
            <button onclick="loadVideo()">PLAY</button>
        </div>

        <div class="player-wrapper" id="playerWrapper"></div>
    </div>

    <script>
        function loadVideo() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const wrapper = document.getElementById('playerWrapper');
            
            if (!urlInput) return;

            wrapper.style.display = 'block';
            wrapper.innerHTML = ''; 

            const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const ytMatch = urlInput.match(ytRegex);

            if (ytMatch && ytMatch[1]) {
                const videoId = ytMatch[1];
                const iframe = document.createElement('iframe');
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                iframe.allowFullscreen = true;
                wrapper.appendChild(iframe);
            } else {
                const video = document.createElement('video');
                video.src = urlInput;
                video.controls = true;
                video.autoplay = true;
                wrapper.appendChild(video);
            }
        }
    </script>
</body>
</html>
